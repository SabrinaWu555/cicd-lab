name: CI Homework

on:
  push:
    branches:
      - '**'

permissions:
  contents: write
  checks: write
  statuses: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Prettier check
        run: npm run lint

      - name: Run tests
        continue-on-error: true 
        run: npm test -- --reporter=junit --outputFile=vitest-junit.xml

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always() # 無論如何都執行
        with:
          name: Vitest Tests Result
          path: '*.xml'
          reporter: java-junit